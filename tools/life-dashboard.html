    function initRoutines() {
      const container = document.getElementById('routines');
      container.innerHTML = `<div class="section-header"><h2>🔄 Routinen</h2><button class="btn-primary" onclick="openRoutineModal()">+ Neue Routine</button></div><div id="routines-today" class="routines-today"></div><h3 style="margin-top:2rem;margin-bottom:1rem;">Alle Routinen</h3><div id="routines-all"></div><div id="routines-stats" class="routines-stats"></div>`;

      function getRout() { return loadData('routines',[]); }
      function setRout(d) { saveData('routines',d); }
      function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
      function todayWD() { return new Date().getDay(); }
      function isDue(r) { const d=todayWD(); if(r.repeat==='daily') return true; if(r.repeat==='weekdays') return d>=1&&d<=5; if(r.repeat==='custom') return (r.repeatDays||[]).includes(d); return true; }
      function totDur(r) { return (r.steps||[]).reduce((s,st)=>s+(st.duration||0),0); }
      function compToday(r) { return (r.completions&&r.completions[getCurrentDateKey()])||[]; }
      function repLabel(r) { if(r.repeat==='daily') return 'Täglich'; if(r.repeat==='weekdays') return 'Mo–Fr'; if(r.repeat==='custom'){const n=['So','Mo','Di','Mi','Do','Fr','Sa'];return(r.repeatDays||[]).map(d=>n[d]).join(', ')||'Keine';} return ''; }
      function esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
      function fdk(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

      function render() {
        const routs = getRout();
        // Today
        const el = document.getElementById('routines-today'), due = routs.filter(isDue);
        if(!due.length) { el.innerHTML='<p style="color:var(--text-secondary);">Heute keine Routinen fällig.</p>'; }
        else { el.innerHTML = due.map(r => { const comp=compToday(r),tot=r.steps.length,done=comp.length,pct=tot>0?Math.round((done/tot)*100):0; return `<div class="routine-card" style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;"><div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" onclick="toggleRoutineSteps('${r.id}')"><div><strong>${esc(r.name)}</strong><span style="color:var(--text-secondary);margin-left:.5rem;font-size:.9em;">${totDur(r)} Min.</span></div><span style="font-size:.85em;color:${pct===100?'var(--accent)':'var(--text-secondary)'};">${done}/${tot}</span></div><div style="background:var(--bg);border-radius:6px;height:8px;margin:.6rem 0;overflow:hidden;"><div style="background:${pct===100?'var(--accent)':'var(--business)'};height:100%;width:${pct}%;transition:width .3s;border-radius:6px;"></div></div><div id="steps-${r.id}" style="display:none;">${r.steps.map((st,i)=>{const isDone=comp.includes(i);return`<label style="display:flex;align-items:center;gap:.5rem;padding:.35rem 0;cursor:pointer;font-size:14px;text-transform:none;letter-spacing:0;${isDone?'text-decoration:line-through;color:var(--text-secondary);':''}"><input type="checkbox" ${isDone?'checked':''} onchange="toggleStep('${r.id}',${i})" style="width:auto;"/>${esc(st.name)}<span style="margin-left:auto;font-size:.85em;color:var(--text-secondary);">${st.duration} Min.</span></label>`;}).join('')}</div></div>`; }).join(''); }

        // All
        const al = document.getElementById('routines-all');
        if(!routs.length) { al.innerHTML='<p style="color:var(--text-secondary);">Noch keine Routinen erstellt.</p>'; }
        else { al.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;">${routs.map(r=>`<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;"><strong>${esc(r.name)}</strong><div style="font-size:.9em;color:var(--text-secondary);margin:.4rem 0;">${r.steps.length} Schritte · ${totDur(r)} Min. · ${repLabel(r)}</div><div style="display:flex;gap:.5rem;margin-top:.6rem;"><button class="btn-sm" onclick="openRoutineModal('${r.id}')">✏️ Bearbeiten</button><button class="btn-sm" onclick="deleteRoutine('${r.id}')" style="color:var(--danger);">🗑️ Löschen</button></div></div>`).join('')}</div>`; }

        // Stats
        const se = document.getElementById('routines-stats');
        if(!routs.length) { se.innerHTML=''; return; }
        let streak=0; const today=new Date();
        for(let d=0;d<365;d++){const dt=new Date(today);dt.setDate(dt.getDate()-d);const k=fdk(dt),wd=dt.getDay();const dr=routs.filter(r=>{if(r.repeat==='daily')return true;if(r.repeat==='weekdays')return wd>=1&&wd<=5;if(r.repeat==='custom')return(r.repeatDays||[]).includes(wd);return true;});if(!dr.length){streak++;continue;}if(dr.every(r=>{const c=(r.completions&&r.completions[k])||[];return c.length>=r.steps.length&&r.steps.length>0;}))streak++;else break;}
        let ts=0,ds=0; for(let d=0;d<7;d++){const dt=new Date(today);dt.setDate(dt.getDate()-d);const k=fdk(dt),wd=dt.getDay();routs.forEach(r=>{const due2=r.repeat==='daily'||(r.repeat==='weekdays'&&wd>=1&&wd<=5)||(r.repeat==='custom'&&(r.repeatDays||[]).includes(wd));if(due2&&r.steps.length>0){ts+=r.steps.length;ds+=((r.completions&&r.completions[k])||[]).length;}});}
        se.innerHTML=`<h4 style="margin:0 0 .5rem;">📊 Statistik</h4><div style="display:flex;gap:2rem;"><div><strong>${streak}</strong> Tage Streak 🔥</div><div><strong>${ts>0?Math.round((ds/ts)*100):0}%</strong> Abschlussrate (7 Tage)</div></div>`;
      }

      window.toggleRoutineSteps = function(id) { const el=document.getElementById('steps-'+id); if(el) el.style.display=el.style.display==='none'?'block':'none'; };
      window.toggleStep = function(rid,si) { const routs=getRout(),r=routs.find(x=>x.id===rid); if(!r) return; const k=getCurrentDateKey(); if(!r.completions) r.completions={}; if(!r.completions[k]) r.completions[k]=[]; const a=r.completions[k],i=a.indexOf(si); if(i>=0) a.splice(i,1); else a.push(si); setRout(routs); render(); setTimeout(()=>{const el=document.getElementById('steps-'+rid);if(el)el.style.display='block';},10); };
      window.deleteRoutine = function(id) { if(!confirm('Routine löschen?')) return; setRout(getRout().filter(r=>r.id!==id)); showNotification('Gelöscht','success'); render(); };

      window.openRoutineModal = function(editId) {
        const routs=getRout(), existing=editId?routs.find(r=>r.id===editId):null;
        const name=existing?existing.name:'', steps=existing?[...existing.steps]:[{name:'',duration:5}], repeat=existing?existing.repeat:'daily', repeatDays=existing?(existing.repeatDays||[]):[];
        const dayNames=[{i:1,n:'Mo'},{i:2,n:'Di'},{i:3,n:'Mi'},{i:4,n:'Do'},{i:5,n:'Fr'},{i:6,n:'Sa'},{i:0,n:'So'}];
        showModal(existing?'Routine bearbeiten':'Neue Routine', `<div style="display:flex;flex-direction:column;gap:1rem;"><div><label>Name</label><input type="text" id="routine-name" value="${esc(name)}" placeholder="z.B. Morgenroutine"></div><div><label>Schritte</label><div id="routine-steps-list">${steps.map((s,i)=>`<div class="routine-step-row" style="display:flex;gap:.5rem;align-items:center;margin-bottom:.4rem;"><input type="text" class="step-name" value="${esc(s.name)}" placeholder="Schrittname" style="flex:1;"><input type="number" class="step-dur" value="${s.duration}" min="1" style="width:70px;"> Min.<button type="button" onclick="removeStep(this)" class="btn-sm" style="color:var(--danger);">✕</button></div>`).join('')}</div><button type="button" id="add-step-btn" class="btn-sm" style="margin-top:.4rem;">+ Schritt</button></div><div><label>Wiederholung</label><div style="margin-top:.3rem;display:flex;flex-direction:column;gap:.3rem;"><label style="font-size:14px;text-transform:none;letter-spacing:0;"><input type="radio" name="routine-repeat" value="daily" ${repeat==='daily'?'checked':''} style="width:auto;"> Täglich</label><label style="font-size:14px;text-transform:none;letter-spacing:0;"><input type="radio" name="routine-repeat" value="weekdays" ${repeat==='weekdays'?'checked':''} style="width:auto;"> Werktage (Mo–Fr)</label><label style="font-size:14px;text-transform:none;letter-spacing:0;"><input type="radio" name="routine-repeat" value="custom" ${repeat==='custom'?'checked':''} style="width:auto;"> Benutzerdefiniert</label></div><div id="custom-days" style="margin-top:.4rem;display:${repeat==='custom'?'flex':'none'};gap:.5rem;flex-wrap:wrap;">${dayNames.map(d=>`<label style="font-size:14px;text-transform:none;letter-spacing:0;"><input type="checkbox" class="custom-day" value="${d.i}" ${repeatDays.includes(d.i)?'checked':''} style="width:auto;"> ${d.n}</label>`).join('')}</div></div></div>`, function() {
          const rName=document.getElementById('routine-name').value.trim(); if(!rName){showNotification('Name eingeben','error');return;}
          const newSteps=[]; document.querySelectorAll('.routine-step-row').forEach(row=>{const n=row.querySelector('.step-name').value.trim(),d=parseInt(row.querySelector('.step-dur').value)||1;if(n)newSteps.push({name:n,duration:d});}); if(!newSteps.length){showNotification('Mind. einen Schritt','error');return;}
          const rRepeat=document.querySelector('input[name="routine-repeat"]:checked').value, rDays=[]; if(rRepeat==='custom') document.querySelectorAll('.custom-day:checked').forEach(cb=>rDays.push(parseInt(cb.value)));
          const allR=getRout();
          if(existing){const r=allR.find(x=>x.id===editId);r.name=rName;r.steps=newSteps;r.repeat=rRepeat;r.repeatDays=rDays;} else {allR.push({id:gid(),name:rName,steps:newSteps,repeat:rRepeat,repeatDays:rDays,completions:{}});}
          setRout(allR); closeModal(); showNotification(existing?'Aktualisiert':'Erstellt','success'); render();
        });
        setTimeout(()=>{
          document.getElementById('add-step-btn').addEventListener('click',function(){const list=document.getElementById('routine-steps-list');const d=document.createElement('div');d.className='routine-step-row';d.style.cssText='display:flex;gap:.5rem;align-items:center;margin-bottom:.4rem;';d.innerHTML='<input type="text" class="step-name" placeholder="Schrittname" style="flex:1;"><input type="number" class="step-dur" value="5" min="1" style="width:70px;"> Min.<button type="button" onclick="removeStep(this)" class="btn-sm" style="color:var(--danger);">✕</button>';list.appendChild(d);});
          document.querySelectorAll('input[name="routine-repeat"]').forEach(r=>r.addEventListener('change',function(){document.getElementById('custom-days').style.display=this.value==='custom'?'flex':'none';}));
        },50);
      };
      window.removeStep = function(btn) { const row=btn.closest('.routine-step-row'),list=document.getElementById('routine-steps-list'); if(list.querySelectorAll('.routine-step-row').length<=1){showNotification('Mind. ein Schritt','error');return;} row.remove(); };

      render();
    }

    /* ══════════════════════════════════════
       AUFGABEN
    ══════════════════════════════════════ */
    function initTasks() {
      const container = document.getElementById('tasks');
      container.innerHTML = `<div class="section-header"><h2>✅ Aufgaben</h2><button id="tasks-add-btn" class="btn-primary">+ Neue Aufgabe</button></div><div id="tasks-filters" style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;"><div style="display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;"><button class="tasks-filter-cat active" data-cat="all" style="padding:6px 14px;border:none;cursor:pointer;font-size:0.8rem;background:rgba(74,158,255,0.2);color:var(--business);">Alle</button><button class="tasks-filter-cat" data-cat="business" style="padding:6px 14px;border:none;cursor:pointer;font-size:0.8rem;background:transparent;color:var(--text-secondary);">Business</button><button class="tasks-filter-cat" data-cat="personal" style="padding:6px 14px;border:none;cursor:pointer;font-size:0.8rem;background:transparent;color:var(--text-secondary);">Privat</button></div><div style="display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;"><button class="tasks-filter-status active" data-status="all" style="padding:6px 14px;border:none;cursor:pointer;font-size:0.8rem;background:rgba(74,158,255,0.2);color:var(--business);">Alle</button><button class="tasks-filter-status" data-status="open" style="padding:6px 14px;border:none;cursor:pointer;font-size:0.8rem;background:transparent;color:var(--text-secondary);">Offen</button><button class="tasks-filter-status" data-status="done" style="padding:6px 14px;border:none;cursor:pointer;font-size:0.8rem;background:transparent;color:var(--text-secondary);">Erledigt</button></div></div><div id="tasks-today"></div><div id="tasks-upcoming" style="margin-top:24px;"></div><div id="tasks-recurring" style="margin-top:24px;"></div><div id="tasks-completed" style="margin-top:24px;"></div>`;

      let tasks = loadData('tasks',[]), fCat='all', fStatus='all';
      const today = getCurrentDateKey();
      const pColors = {high:'#ff4757',medium:'#ffa502',low:'#8892a8'}, cColors = {business:'#4a9eff',personal:'#a78bfa'}, cLabels = {business:'Business',personal:'Privat'};

      function save() { saveData('tasks',tasks); }
      function gid() { return 't_'+Date.now()+'_'+Math.random().toString(36).slice(2,8); }
      function isCompToday(t) { return t.completions && t.completions.includes(today); }
      function isDueToday(t) { if(t.recurring && t.recurringRule) return isRecurDue(t,today); return t.dueDate===today; }
      function isRecurDue(t,ds) { const d=new Date(ds+'T00:00:00'),wd=d.getDay(),rule=t.recurringRule; if(rule==='daily') return true; if(rule==='weekly'){return new Date(t.createdAt+'T00:00:00').getDay()===wd;} if(rule==='monthly'){return new Date(t.createdAt+'T00:00:00').getDate()===d.getDate();} if(typeof rule==='object'&&rule.type==='weekdays'){return rule.days.includes(wd===0?7:wd);} return false; }
      function recurText(t) { const r=t.recurringRule; if(!r) return ''; if(r==='daily') return 'Täglich'; if(r==='weekly') return 'Wöchentlich'; if(r==='monthly') return 'Monatlich'; if(typeof r==='object'&&r.type==='weekdays'){const n={1:'Mo',2:'Di',3:'Mi',4:'Do',5:'Fr',6:'Sa',7:'So'};return r.days.map(d=>n[d]).join(', ');} return ''; }
      function fmtDate(ds) { if(!ds) return ''; return ds.split('-').reverse().join('.'); }

      function render() {
        // Today
        const tEl=document.getElementById('tasks-today'), todayT=tasks.filter(isDueToday);
        const todayF=todayT.filter(t=>(fCat==='all'||t.category===fCat)&&(fStatus==='all'||(fStatus==='open'&&!isCompToday(t))||(fStatus==='done'&&isCompToday(t))));
        const open=todayF.filter(t=>!isCompToday(t)), done=todayF.filter(t=>isCompToday(t));
        let th=`<div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;"><h3>Heute fällig</h3><span style="background:rgba(74,158,255,0.15);color:var(--business);font-size:0.8rem;padding:2px 8px;border-radius:10px;">${todayT.filter(t=>!isCompToday(t)).length} offen</span></div>`;
        if(![...open,...done].length) th+=`<div style="padding:20px;text-align:center;color:var(--text-secondary);background:var(--card);border-radius:8px;">Keine Aufgaben heute</div>`;
        else [...open,...done].forEach(t=>{const d=isCompToday(t);th+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;opacity:${d?0.5:1};"><input type="checkbox" class="task-check" data-id="${t.id}" ${d?'checked':''} style="width:18px;height:18px;cursor:pointer;accent-color:${pColors[t.priority]};"><span style="width:10px;height:10px;border-radius:50%;background:${pColors[t.priority]};flex-shrink:0;"></span><span style="flex:1;font-size:0.9rem;${d?'text-decoration:line-through;':''}">${t.title}</span><span style="font-size:0.7rem;padding:2px 8px;border-radius:4px;background:${cColors[t.category]}22;color:${cColors[t.category]};">${cLabels[t.category]||t.category}</span><button class="task-edit" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);">✏️</button><button class="task-del" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);">🗑️</button></div>`;});
        tEl.innerHTML=th;

        // Upcoming
        const uEl=document.getElementById('tasks-upcoming');
        const uTasks=tasks.filter(t=>!t.recurring&&t.dueDate&&t.dueDate>today&&(fCat==='all'||t.category===fCat)).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
        let uh=`<h3 style="margin-bottom:10px;">Demnächst</h3>`;
        if(!uTasks.length) uh+=`<div style="padding:16px;text-align:center;color:var(--text-secondary);background:var(--card);border-radius:8px;">Keine anstehenden Aufgaben</div>`;
        else { let ld=''; uTasks.forEach(t=>{if(t.dueDate!==ld){ld=t.dueDate;uh+=`<div style="font-size:0.8rem;color:var(--text-secondary);margin:12px 0 4px;font-weight:600;">${fmtDate(t.dueDate)}</div>`;} uh+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;"><span style="width:10px;height:10px;border-radius:50%;background:${pColors[t.priority]};"></span><span style="flex:1;font-size:0.9rem;">${t.title}</span><span style="font-size:0.7rem;padding:2px 8px;border-radius:4px;background:${cColors[t.category]}22;color:${cColors[t.category]};">${cLabels[t.category]||t.category}</span><button class="task-edit" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);">✏️</button><button class="task-del" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);">🗑️</button></div>`;}); }
        uEl.innerHTML=uh;

        // Recurring
        const rEl=document.getElementById('tasks-recurring'), rTasks=tasks.filter(t=>t.recurring&&(fCat==='all'||t.category===fCat));
        let rh=`<h3 style="margin-bottom:10px;">Wiederkehrend</h3>`;
        if(!rTasks.length) rh+=`<div style="padding:16px;text-align:center;color:var(--text-secondary);background:var(--card);border-radius:8px;">Keine wiederkehrenden Aufgaben</div>`;
        else rTasks.forEach(t=>{rh+=`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;"><span style="width:10px;height:10px;border-radius:50%;background:${pColors[t.priority]};"></span><span style="flex:1;font-size:0.9rem;">${t.title}</span><span style="font-size:0.75rem;color:var(--text-secondary);">🔁 ${recurText(t)}</span><button class="task-edit" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);">✏️</button><button class="task-del" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:var(--text-secondary);">🗑️</button></div>`;});
        rEl.innerHTML=rh;

        // Completed
        const cEl=document.getElementById('tasks-completed');
        const allComp=[]; tasks.forEach(t=>{(t.completions||[]).forEach(d=>allComp.push({task:t,date:d}));}); allComp.sort((a,b)=>b.date.localeCompare(a.date));
        cEl.innerHTML=`<details><summary style="font-size:1.1rem;font-weight:600;cursor:pointer;color:var(--text-primary);list-style:none;display:flex;align-items:center;gap:8px;">▶ Erledigte <span style="background:var(--card);color:var(--text-secondary);font-size:0.8rem;padding:2px 8px;border-radius:10px;">${allComp.length}</span></summary><div style="margin-top:8px;">${allComp.slice(0,20).map(c=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--card);border-radius:8px;margin-bottom:4px;opacity:0.6;"><span style="flex:1;font-size:0.85rem;">${c.task.title}</span><span style="font-size:0.75rem;color:var(--text-secondary);">${fmtDate(c.date)}</span><button class="task-restore" data-id="${c.task.id}" data-date="${c.date}" style="background:none;border:none;cursor:pointer;font-size:0.75rem;color:var(--business);">Wiederherstellen</button></div>`).join('')||'<div style="padding:16px;text-align:center;color:var(--text-secondary);">Keine</div>'}</div></details>`;

        attachListeners();
      }

      function attachListeners() {
        document.querySelectorAll('.task-check').forEach(cb=>cb.addEventListener('change',function(){const t=tasks.find(x=>x.id===this.dataset.id);if(!t)return;if(!t.completions)t.completions=[];if(this.checked){if(!t.completions.includes(today))t.completions.push(today);showNotification('Erledigt!','success');}else{t.completions=t.completions.filter(d=>d!==today);}save();render();}));
        document.querySelectorAll('.task-edit').forEach(b=>b.addEventListener('click',()=>{const t=tasks.find(x=>x.id===b.dataset.id);if(t)openTaskModal(t);}));
        document.querySelectorAll('.task-del').forEach(b=>b.addEventListener('click',()=>{if(!confirm('Aufgabe löschen?'))return;tasks=tasks.filter(x=>x.id!==b.dataset.id);save();render();showNotification('Gelöscht','success');}));
        document.querySelectorAll('.task-restore').forEach(b=>b.addEventListener('click',()=>{const t=tasks.find(x=>x.id===b.dataset.id);if(t){t.completions=(t.completions||[]).filter(d=>d!==b.dataset.date);save();render();showNotification('Wiederhergestellt','success');}}));
      }

      function openTaskModal(existing) {
        const t=existing||null, isEdit=!!t;
        const curRule=t?t.recurringRule:null; let rv='daily'; if(curRule==='daily')rv='daily';else if(curRule==='weekly')rv='weekly';else if(curRule==='monthly')rv='monthly';else if(typeof curRule==='object')rv='weekdays';
        const wdChecks=[1,2,3,4,5,6,7].map(d=>{const n={1:'Mo',2:'Di',3:'Mi',4:'Do',5:'Fr',6:'Sa',7:'So'};const ch=t&&typeof t.recurringRule==='object'&&t.recurringRule.days&&t.recurringRule.days.includes(d)?'checked':'';return `<label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="checkbox" class="task-weekday" value="${d}" ${ch} style="width:auto;">${n[d]}</label>`;}).join('');

        showModal(isEdit?'Aufgabe bearbeiten':'Neue Aufgabe', `<div style="display:flex;flex-direction:column;gap:14px;"><div><label>Titel</label><input type="text" id="task-title" value="${t?t.title.replace(/"/g,'&quot;'):''}" placeholder="Aufgabe..."></div><div><label>Beschreibung</label><textarea id="task-desc" rows="2" placeholder="Optional...">${t?t.description||'':''}</textarea></div><div style="display:flex;gap:20px;flex-wrap:wrap;"><div><label>Kategorie</label><div style="display:flex;gap:8px;"><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="radio" name="task-cat" value="business" ${!t||t.category==='business'?'checked':''} style="width:auto;">Business</label><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="radio" name="task-cat" value="personal" ${t&&t.category==='personal'?'checked':''} style="width:auto;">Privat</label></div></div><div><label>Priorität</label><div style="display:flex;gap:8px;"><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="radio" name="task-prio" value="high" ${t&&t.priority==='high'?'checked':''} style="width:auto;">Hoch</label><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="radio" name="task-prio" value="medium" ${!t||t.priority==='medium'?'checked':''} style="width:auto;">Mittel</label><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="radio" name="task-prio" value="low" ${t&&t.priority==='low'?'checked':''} style="width:auto;">Niedrig</label></div></div></div><div><label>Fälligkeitsdatum</label><input type="date" id="task-due" value="${t&&t.dueDate?t.dueDate:''}"></div><div><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" id="task-recurring" ${t&&t.recurring?'checked':''} style="width:auto;">Wiederkehrend</label><div id="task-recurring-opts" style="margin-top:10px;display:${t&&t.recurring?'block':'none'};padding:12px;background:var(--bg);border-radius:8px;"><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;"><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="radio" name="task-rule" value="daily" ${rv==='daily'?'checked':''} style="width:auto;">Täglich</label><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="radio" name="task-rule" value="weekly" ${rv==='weekly'?'checked':''} style="width:auto;">Wöchentlich</label><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="radio" name="task-rule" value="monthly" ${rv==='monthly'?'checked':''} style="width:auto;">Monatlich</label><label style="font-size:14px;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:4px;"><input type="radio" name="task-rule" value="weekdays" ${rv==='weekdays'?'checked':''} style="width:auto;">Bestimmte Tage</label></div><div id="task-weekday-select" style="display:${rv==='weekdays'?'flex':'none'};gap:8px;flex-wrap:wrap;">${wdChecks}</div></div></div></div>`, function() {
          const title=document.getElementById('task-title').value.trim(); if(!title){showNotification('Titel eingeben','error');return;}
          const desc=document.getElementById('task-desc').value.trim(), cat=document.querySelector('input[name="task-cat"]:checked').value, prio=document.querySelector('input[name="task-prio"]:checked').value, due=document.getElementById('task-due').value||null, isRec=document.getElementById('task-recurring').checked;
          let rule=null; if(isRec){const rv2=document.querySelector('input[name="task-rule"]:checked'); if(rv2){if(rv2.value==='weekdays'){const days=[];document.querySelectorAll('.task-weekday:checked').forEach(cb=>days.push(parseInt(cb.value)));if(!days.length){showNotification('Mind. einen Tag wählen','error');return;}rule={type:'weekdays',days};}else rule=rv2.value;}}
          if(isEdit){t.title=title;t.description=desc;t.category=cat;t.priority=prio;t.dueDate=due;t.recurring=isRec;t.recurringRule=rule;}else{tasks.push({id:gid(),title,description:desc,category:cat,priority:prio,dueDate:due,recurring:isRec,recurringRule:rule,completions:[],createdAt:today});}
          save();closeModal();render();showNotification(isEdit?'Aktualisiert':'Erstellt','success');
        });
        setTimeout(()=>{document.getElementById('task-recurring').addEventListener('change',function(){document.getElementById('task-recurring-opts').style.display=this.checked?'block':'none';});document.querySelectorAll('input[name="task-rule"]').forEach(r=>r.addEventListener('change',function(){document.getElementById('task-weekday-select').style.display=this.value==='weekdays'?'flex':'none';}));},50);
      }

      document.querySelectorAll('.tasks-filter-cat').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.tasks-filter-cat').forEach(x=>{x.style.background='transparent';x.style.color='var(--text-secondary)';});this.style.background='rgba(74,158,255,0.2)';this.style.color='var(--business)';fCat=this.dataset.cat;render();}));
      document.querySelectorAll('.tasks-filter-status').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.tasks-filter-status').forEach(x=>{x.style.background='transparent';x.style.color='var(--text-secondary)';});this.style.background='rgba(74,158,255,0.2)';this.style.color='var(--business)';fStatus=this.dataset.status;render();}));
      document.getElementById('tasks-add-btn').addEventListener('click',()=>openTaskModal(null));
      render();
    }

    /* ══════════════════════════════════════
       ZIELE
    ══════════════════════════════════════ */
    function initGoals() {
      const container = document.getElementById('goals');
      container.innerHTML = `<div class="section-header"><h2>🎯 Ziele</h2><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;"><div id="goals-filter" style="display:flex;gap:6px;"><button class="goals-filter-btn active" data-filter="all" style="padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;font-size:0.85rem;">Alle</button><button class="goals-filter-btn" data-filter="health" style="padding:6px 14px;border-radius:20px;border:1px solid rgba(0,229,160,0.3);background:transparent;color:var(--accent);cursor:pointer;font-size:0.85rem;">Gesundheit</button><button class="goals-filter-btn" data-filter="business" style="padding:6px 14px;border-radius:20px;border:1px solid rgba(74,158,255,0.3);background:transparent;color:var(--business);cursor:pointer;font-size:0.85rem;">Business</button><button class="goals-filter-btn" data-filter="personal" style="padding:6px 14px;border-radius:20px;border:1px solid rgba(167,139,250,0.3);background:transparent;color:var(--personal);cursor:pointer;font-size:0.85rem;">Persönlich</button></div><button id="goals-add-btn" class="btn-primary">+ Neues Ziel</button></div></div><div id="goals-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;"></div><div id="goals-achieved-section" style="margin-top:32px;display:none;"><div id="goals-achieved-toggle" style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:16px;"><span id="goals-achieved-arrow" style="transition:transform 0.2s;display:inline-block;">▶</span><h3 style="margin:0;color:var(--text-secondary);">Erreichte Ziele</h3><span id="goals-achieved-count" style="background:rgba(0,229,160,0.15);color:var(--accent);padding:2px 10px;border-radius:12px;font-size:0.8rem;"></span></div><div id="goals-achieved-grid" style="display:none;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;"></div></div><div id="goals-empty" style="display:none;text-align:center;padding:60px 20px;"><div style="font-size:3rem;margin-bottom:16px;">🎯</div><p style="color:var(--text-secondary);margin-bottom:20px;">Noch keine Ziele definiert.</p><button id="goals-empty-add" class="btn-primary">Erstes Ziel erstellen</button></div>`;

      const CC = {health:'#00e5a0',business:'#4a9eff',personal:'#a78bfa'}, CL = {health:'Gesundheit',business:'Business',personal:'Persönlich'};
      let curFilter='all', sparkCharts={};

      function getG() { return loadData('goals',[]); }
      function setG(g) { saveData('goals',g); }
      function gid() { return 'g_'+Date.now()+'_'+Math.random().toString(36).substr(2,9); }
      function calcProg(g) { const r=g.targetValue-g.startValue; if(r===0) return g.achieved?100:0; return Math.max(0,Math.min(100,((g.currentValue-g.startValue)/r)*100)); }
      function getTrend(g) { if(!g.entries||g.entries.length<2) return null; const s=[...g.entries].sort((a,b)=>a.date.localeCompare(b.date)),d=s[s.length-1].value-s[s.length-2].value; if(d===0) return null; return {positive:(g.targetValue>g.startValue)?d>0:d<0,diff:d}; }
      function checkAch(g) { return g.targetValue>g.startValue?g.currentValue>=g.targetValue:g.currentValue<=g.targetValue; }

      function renderGoalCard(g) {
        const col=CC[g.category]||'#4a9eff',lab=CL[g.category]||g.category,prog=calcProg(g),trend=getTrend(g),cid='sparkline_'+g.id;
        let tH=''; if(trend) tH=trend.positive?`<span style="color:var(--accent);font-weight:600;">↑ Positiv</span>`:`<span style="color:var(--danger);font-weight:600;">↓ Negativ</span>`;
        return `<div class="goal-card" data-id="${g.id}" style="position:relative;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:transform 0.2s;${g.achieved?'opacity:0.75;':''}">${g.achieved?'<div style="position:absolute;top:12px;left:12px;background:rgba(0,229,160,0.15);color:var(--accent);padding:4px 12px;border-radius:8px;font-size:0.8rem;font-weight:600;">Erreicht ✓</div>':''}<div style="display:flex;justify-content:space-between;margin-bottom:12px;"><div style="display:flex;align-items:center;gap:8px;"><div style="width:10px;height:10px;border-radius:50%;background:${col};"></div><span style="font-size:0.8rem;color:${col};">${lab}</span></div><div style="display:flex;gap:6px;"><button class="goal-edit" data-id="${g.id}" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;">✏️</button><button class="goal-del" data-id="${g.id}" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;">🗑️</button></div></div><h3 style="margin:0 0 16px;font-size:1.15rem;font-weight:700;">${g.name}</h3><div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;"><span style="font-size:2rem;font-weight:800;">${g.currentValue}</span><span style="color:var(--text-secondary);">${g.unit}</span><span style="font-size:0.85rem;color:var(--text-secondary);margin-left:auto;">Ziel: ${g.targetValue} ${g.unit}</span></div><div style="background:var(--bg);border-radius:8px;height:8px;margin-bottom:8px;overflow:hidden;"><div style="height:100%;border-radius:8px;background:${col};width:${prog}%;transition:width 0.5s;"></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><span style="font-size:0.85rem;color:var(--text-secondary);">${Math.round(prog)}% erreicht</span>${tH}</div>${g.entries&&g.entries.length>1?`<div style="height:40px;margin-bottom:16px;"><canvas id="${cid}" style="width:100%;height:40px;"></canvas></div>`:''}<div style="display:flex;justify-content:flex-end;">${g.achieved?`<button class="goal-react" data-id="${g.id}" style="padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:0.8rem;">Reaktivieren</button>`:`<button class="goal-log" data-id="${g.id}" style="padding:6px 14px;border-radius:8px;border:none;background:${col}22;color:${col};cursor:pointer;font-size:0.85rem;font-weight:600;">Wert eintragen</button>`}</div></div>`;
      }

      function renderSparklines(goals) { Object.values(sparkCharts).forEach(c=>{try{c.destroy();}catch(e){}}); sparkCharts={}; goals.forEach(g=>{if(!g.entries||g.entries.length<2)return;const cv=document.getElementById('sparkline_'+g.id);if(!cv)return;const col=CC[g.category]||'#4a9eff',s=[...g.entries].sort((a,b)=>a.date.localeCompare(b.date));sparkCharts[g.id]=new Chart(cv,{type:'line',data:{labels:s.map(e=>e.date),datasets:[{data:s.map(e=>e.value),borderColor:col,borderWidth:2,pointRadius:0,fill:true,backgroundColor:col+'15',tension:0.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:{duration:500}}});}); }

      function render() {
        const goals=getG(), active=goals.filter(g=>!g.achieved), achieved=goals.filter(g=>g.achieved);
        const filtered=curFilter==='all'?active:active.filter(g=>g.category===curFilter);
        const grid=document.getElementById('goals-grid'), empty=document.getElementById('goals-empty'), achSec=document.getElementById('goals-achieved-section'), achGrid=document.getElementById('goals-achieved-grid');

        if(!goals.length) { grid.style.display='none'; empty.style.display='block'; achSec.style.display='none'; }
        else { empty.style.display='none'; grid.style.display='grid'; grid.innerHTML=filtered.length?filtered.map(g=>renderGoalCard(g)).join(''):'<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-secondary);">Keine Ziele in dieser Kategorie</div>';
          if(achieved.length){achSec.style.display='block';document.getElementById('goals-achieved-count').textContent=achieved.length;const fa=curFilter==='all'?achieved:achieved.filter(g=>g.category===curFilter);achGrid.innerHTML=fa.map(g=>renderGoalCard(g)).join('');}else achSec.style.display='none'; }
        setTimeout(()=>renderSparklines([...filtered,...achieved]),50);

        // Listeners
        document.querySelectorAll('.goal-log').forEach(b=>b.addEventListener('click',()=>showLogModal(b.dataset.id)));
        document.querySelectorAll('.goal-edit').forEach(b=>b.addEventListener('click',()=>{const g=getG().find(x=>x.id===b.dataset.id);if(g)showGoalModal(g);}));
        document.querySelectorAll('.goal-del').forEach(b=>b.addEventListener('click',()=>{if(!confirm('Ziel löschen?'))return;setG(getG().filter(x=>x.id!==b.dataset.id));render();showNotification('Gelöscht','success');}));
        document.querySelectorAll('.goal-react').forEach(b=>b.addEventListener('click',()=>{const gs=getG(),i=gs.findIndex(x=>x.id===b.dataset.id);if(i!==-1){gs[i].achieved=false;setG(gs);render();showNotification('Reaktiviert','success');}}));
      }

      function showGoalModal(existing) {
        const isEdit=!!existing, g=existing||{name:'',category:'health',startValue:0,targetValue:100,unit:''};
        showModal(isEdit?'Ziel bearbeiten':'Neues Ziel', `<div style="display:flex;flex-direction:column;gap:16px;"><div><label>Name</label><input id="gm-name" type="text" value="${g.name}" placeholder="z.B. Gewicht reduzieren"></div><div><label>Kategorie</label><select id="gm-cat"><option value="health" ${g.category==='health'?'selected':''}>Gesundheit</option><option value="business" ${g.category==='business'?'selected':''}>Business</option><option value="personal" ${g.category==='personal'?'selected':''}>Persönlich</option></select></div><div class="grid-2"><div><label>Startwert</label><input id="gm-start" type="number" value="${g.startValue}"></div><div><label>Einheit</label><input id="gm-unit" type="text" value="${g.unit}" placeholder="kg, €, ..."></div></div><div><label>Zielwert</label><input id="gm-target" type="number" value="${g.targetValue}"></div></div>`, () => {
          const name=document.getElementById('gm-name').value.trim(); if(!name){showNotification('Name eingeben','error');return;}
          const gs=getG(), cat=document.getElementById('gm-cat').value, sv=parseFloat(document.getElementById('gm-start').value)||0, unit=document.getElementById('gm-unit').value.trim(), tv=parseFloat(document.getElementById('gm-target').value)||0;
          if(isEdit){const i=gs.findIndex(x=>x.id===existing.id);if(i!==-1){gs[i].name=name;gs[i].category=cat;gs[i].startValue=sv;gs[i].unit=unit;gs[i].targetValue=tv;gs[i].achieved=checkAch(gs[i]);}}else{gs.push({id:gid(),name,category:cat,startValue:sv,currentValue:sv,targetValue:tv,unit,entries:[{date:getCurrentDateKey(),value:sv}],achieved:false,createdAt:getCurrentDateKey()});}
          setG(gs);closeModal();render();showNotification(isEdit?'Aktualisiert':'Erstellt','success');
        });
      }

      function showLogModal(goalId) {
        const gs=getG(), g=gs.find(x=>x.id===goalId); if(!g) return;
        showModal('Wert eintragen', `<div style="display:flex;flex-direction:column;gap:16px;"><p style="color:var(--text-secondary);">Neuer Wert für <strong style="color:var(--text-primary);">${g.name}</strong>:</p><div><label>Datum</label><input id="gl-date" type="date" value="${getCurrentDateKey()}"></div><div><label>Neuer Wert (${g.unit})</label><input id="gl-value" type="number" step="any" placeholder="${g.currentValue}"></div></div>`, () => {
          const date=document.getElementById('gl-date').value, val=parseFloat(document.getElementById('gl-value').value); if(isNaN(val)){showNotification('Wert eingeben','error');return;}
          const gs2=getG(), i=gs2.findIndex(x=>x.id===goalId); if(i===-1) return;
          const ei=gs2[i].entries.findIndex(e=>e.date===date); if(ei!==-1) gs2[i].entries[ei].value=val; else gs2[i].entries.push({date,value:val});
          gs2[i].currentValue=val; gs2[i].achieved=checkAch(gs2[i]);
          setG(gs2);closeModal();render();showNotification(`${val} ${gs2[i].unit} eingetragen`,'success');
        });
      }

      document.getElementById('goals-add-btn').addEventListener('click',()=>showGoalModal(null));
      document.getElementById('goals-empty-add')?.addEventListener('click',()=>showGoalModal(null));
      document.getElementById('goals-filter').addEventListener('click',e=>{const b=e.target.closest('.goals-filter-btn');if(!b)return;document.querySelectorAll('.goals-filter-btn').forEach(x=>{x.style.background='transparent';});b.style.background='rgba(255,255,255,0.1)';curFilter=b.dataset.filter;render();});
      document.getElementById('goals-achieved-toggle').addEventListener('click',()=>{const g=document.getElementById('goals-achieved-grid'),a=document.getElementById('goals-achieved-arrow');if(g.style.display==='none'){g.style.display='grid';a.style.transform='rotate(90deg)';}else{g.style.display='none';a.style.transform='rotate(0deg)';}});
      render();
    }

    /* ══════════════════════════════════════
       INIT
    ══════════════════════════════════════ */
    sectionInits.health = initHealth;
    sectionInits.nutrition = initNutrition;
    sectionInits.schedule = initSchedule;
    sectionInits.routines = initRoutines;
    sectionInits.tasks = initTasks;
    sectionInits.goals = initGoals;

    // Init dashboard immediately
    initDashboard();
    sectionInitialized.dashboard = true;
  </script>
</body>
</html>
